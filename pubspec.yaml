name: offline_posts_manager
description: A Flutter app for managing posts offline using SQLite
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # SQLite database with web support
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0  # Add this for web support
  
  # Path provider with web support
  path_provider: ^2.1.0
  path_provider_platform_interface: ^2.1.0
  
  # For date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true